services:
  - type: web
    name: shooni-frontend
    env: static
    rootDir: frontend/app
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_DATA_ENDPOINT_URL
        sync: false
      - key: VITE_DATA_ENDPOINT_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_REVIEW_ENDPOINT_URL
        sync: false
      - key: VITE_GET_REVIEWS_ENDPOINT_URL
        sync: false
      - key: VITE_TOGGLE_FAVORITE_ENDPOINT_URL
        sync: false
      - key: VITE_GET_FAVORITES_ENDPOINT_URL
        sync: false
      - key: VITE_SUBMIT_SUBLEASE_ENDPOINT_URL
        sync: false
      - key: VITE_GET_SUBLEASES_ENDPOINT_URL
        sync: false
      - key: VITE_DELETE_REVIEW_ENDPOINT_URL
        sync: false
      - key: VITE_DELETE_SUBLEASE_ENDPOINT_URL
        sync: false
